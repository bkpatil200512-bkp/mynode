<!DOCTYPE html>
<html lang="en">
<head>
  <title>Registered users</title>
</head>
<body>
  <table border="1">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
      </tr>
    </thead>
    <tbody id="userTable"></tbody>
  </table>

  <script>
    let users=JSON.parse(localStorage.getItem("users")) || [];
    let table=document.getElementById("userTable");
    users.forEach(function(user){
      let row=`<tr>
        <td>${user.name}</td>
        <td>${user.email}</td>
        <tr>`;
      table.innerHTML+=row;
    });
  </script>
</body>
</html>
