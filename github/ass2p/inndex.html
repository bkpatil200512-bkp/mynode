<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration</title>
  <style>
    form{
      border:1px solid black;
      padding:15px;
      width:250px;
      background-color:white;
      
    }
    body{
      font-family: Arial, Helvetica, sans-serif;
      background: lightblue;
        }
    input{
      margin: 5px;
    }
    button{
      padding: 5px 10px;
      background-color: green;
      color:white;
    }
  </style>
</head>
<body>
  <form id="regform">
    Name: <input type="text" id="name" required><br><br>
    Email: <input type="email" id="email" required><br><br>
    Password: <input type="password" id="password" required><br><br>  

    <button type="Submit">Register</button>
  </form>
  <script>
    document.getElementById("regform").addEventListener("submit",function(e){
      e.preventDefault();
      let user={
        name:document.getElementById("name").value,
        email:document.getElementById("email").value,
        password:document.getElementById("password").value

      };
      let xhr=new XMLHttpRequest();
      xhr.open("POST","save.html",true);
      xhr.setRequestHeader("Content-Type","application/json");

      xhr.onload=function(){
        if(xhr.status===200 || xhr.status===0){
          let users=JSON.parse(localStorage.getItem("users")) || [];
          users.push(user);
          local.setItem("users", JSON.stringify(users));
          window.location.href="display.html";

        }
      };
      xhr.send(JSON.stringify(user));

    });
  </script>
</body>
</html>
