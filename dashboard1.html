<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar{
            height: 100vh;
            background: black;
            color:white;
            padding: 20px;

        }
        .cards{
            text-align: center;
            padding:10px;
            color:white;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-2 sidebar">
                <h3>Home</h3>
                <p>Students</p>
                <p>Exams</p>
                <p>Results</p>
            </div>

            <div class="col-10 pd-4">
                <h1>Dashboard</h1>
                <div class="row">
                    <div class="col-md-4">
                        <div class="card bg-primary">
                            <h3>Students</h3>
                            <p>200</p>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card bg-success">
                            <h3>Exams</h3>
                            <p>250</p>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card bg-danger">
                            <h3>Results</h3>
                            <p>100%</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
