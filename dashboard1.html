<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar{
            height: 100vh;
            background: black;
            color: white;
            padding: 20px;
        }
        .card{
            color: white;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-2 sidebar">
                <h3>Admin</h3>
                <p>Home</p>
                <P>Students</P>
                <P>Result</P>
                <p>Exams</p>
            </div>

            <div class="col-10 p-4">
                <h3>Dashboard</h3>
                <div class="row">
                    <div class="col-md-4">
                        <div class="card bg-primary">
                            <h2>Students</h2>
                            <p>200</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card bg-success">
                            <h2>Exams</h2>
                            <p>20</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card bg-danger">
                             <h2>Result</h2>
                             <p>100%</p>
                        </div>

                    </div>

                </div>

            </div>
        </div>
    </div>
</body>
</html>
