<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regustration Form</title>
</head>
<body>
  <h2>Registration form</h2>
  <form id="regfrom">
      Name:<input type="name" text="name" required><br><br>
      Email:<input type="email" text="email" required><br><br>
      Password:<input type="password" text-="password" required><br><br>
      <button type="Submit">Register</button>
  </form>
  <script>
    document.getElementById("regform").addEventListener("submit", function(e) {
      e.preventDefault();
      let user={
        name:document.getElementById("name").value,
        email:document.getElementById("email").value,
        password:document.getElementById("password").value
      };
      let xhr=new XMLHttpRequest();
      xhr.open("post", "save.html", true);
      xhr.setRequestHeader("Content-Type", "application/json");

      xhr.onload=function(){
        if(xhr.status===200 || xhr.status===0){
          let users=JSON.parse(localStorage.getItem("users")) || [];
          users.push(user);
          localStorage.setItem("users", JSON.stringify(users));
          window.location.href="display.html";
        }
      };
      xhr.send(JSON.stringify(user));
    });
  </script>
</body>
</html>
