<!DOCTYPE html>
<html>
<head>
    <title>Registered Users</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(182, 182, 153);
        }
        table{
            border-collapse:separate;
            background-color: white;
        }
        th{
            background-color: blue;
            color:white;
        }
        th,td{
            padding: 8px;;
        }
    </style>
</head>
<body>

<h2>Registered Users</h2>

<table border="1">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
        </tr>
    </thead>
    <tbody id="UserTable"></tbody>
</table>

<script>
let users=document.getElementById(localStorage.getItem("users")) || [];
let table=document.getElementById("UserTable");

users.forEach(function(user){
    let row=`<tr>
        <td>${user.name}</td>
        <td>${user.email}</td>
        </tr>`;
        table.innerHTML+=row;
});




</body>
</html>
