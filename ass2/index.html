<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

<h2>User Registration</h2>

<form id="regForm">
    Name: <input type="text" id="name" required><br><br>
    Email: <input type="email" id="email" required><br><br>
    Password: <input type="password" id="password" required><br><br>

    <button type="submit">Register</button>
</form>

<script>
document.getElementById("regForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let user = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    // AJAX POST (simulated since no backend)
    let xhr = new XMLHttpRequest();
    xhr.open("POST", "save.html", true);
    xhr.setRequestHeader("Content-Type", "application/json");

    xhr.onload = function() {
        if (xhr.status === 200 || xhr.status === 0) {

            // Get existing users
            let users = JSON.parse(localStorage.getItem("users")) || [];

            // Add new user
            users.push(user);

            // Save back to localStorage
            localStorage.setItem("users", JSON.stringify(users));

            // Redirect to display page
            window.location.href = "display.html";
        }
    };

    xhr.send(JSON.stringify(user));
});
</script>

</body>
</html>
