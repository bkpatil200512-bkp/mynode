<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar{
            height:100vh;
            background:black;
            color:white;
            padding:20px;
        }

        .card{
            padding:20px;
            text-align:center;
            color:white;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-2 sidebar">
            <h3>Admin</h3>
            <p>Home</p>
            <p>Students</p>
            <p>Exams</p>
        </div>

        <!-- Main Content -->
        <div class="col-10 p-4">

            <h2>Dashboard</h2>
            

            <div class="row">

                <div class="col-md-4">
                    <div class="card bg-primary">
                        <h3>500</h3>
                        <p>Students</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card bg-success">
                        <h3>20</h3>
                        <p>Exams</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card bg-danger">
                        <h3>95%</h3>
                        <p>Result</p>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
